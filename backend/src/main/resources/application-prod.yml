spring:
  datasource:
    url: jdbc:postgresql://${RDS_HOST}:5432/ipove_prod
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: 5672
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASS}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://auth.ipove.ai/realms/ipove-platform

ipove:
  notifications:
    email:
      enabled: true
      provider: sendgrid
      api-key: ${SENDGRID_API_KEY}
      from-address: noreply@ipove.ai
      from-name: ipove.ai
    sms:
      enabled: true
      provider: twilio
      account-sid: ${TWILIO_ACCOUNT_SID}
      auth-token: ${TWILIO_AUTH_TOKEN}
      from-number: ${TWILIO_FROM_NUMBER}

logging:
  level:
    ai.ipove: WARN
    root: WARN

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ipove_dev
    username: ipove
    password: ipove_secret
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

  rabbitmq:
    host: localhost
    port: 5672
    username: ipove
    password: ipove_secret

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/ipove-platform
          jwk-set-uri: http://localhost:8180/realms/ipove-platform/protocol/openid-connect/certs

ipove:
  notifications:
    email:
      enabled: true
      provider: console
      from-address: noreply@ipove.ai
      from-name: ipove.ai
    sms:
      enabled: true
      provider: console

logging:
  level:
    ai.ipove: DEBUG
    org.hibernate.SQL: DEBUG

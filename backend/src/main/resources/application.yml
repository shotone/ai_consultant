spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: ipove-ai

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# LLM გასაღებები მხოლოდ env-იდან (იხ. AiProperties): GOOGLE_AI_API_KEY / IPOVE_AI_GOOGLE_API_KEY, ANTHROPIC_API_KEY / IPOVE_AI_ANTHROPIC_API_KEY.
ipove:
  ai:
    model: claude-3-5-sonnet-20241022
    max-tokens: 2048
    # იგივე ID რაც AI Studio curl-ში (v1beta); ძველი სახელები (მაგ. gemini-1.5-flash) შეიძლება 404 იყოს.
    google-ai-model: gemini-flash-latest
    google-ai-max-output-tokens: 2048
    buyer-nl-sql-enabled: true
    buyer-nl-sql-max-rows: 30

logging:
  level:
    ai.ipove: DEBUG
    org.springframework.security: INFO
